<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كيس الصائم - شيفا للسفر</title>
    <style>
        body { background-color: #4db8ff; font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .title-en { font-size: 35px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .title-ar { font-size: 38px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .content-card {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            border-top: 8px solid #f39c12; /* لون برتقالي رمضاني */
        }

        .alert-box {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .closed-form {
            opacity: 0.6;
            pointer-events: none; /* يمنع الضغط أو الكتابة تماماً */
            user-select: none;
        }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }

        .back-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 25px;
            background: #000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-disabled {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="title-en">✈️ Shifaa Travel</div>
        <div class="title-ar">شيفا للسفر والسياحة ✈️</div>
    </div>

    <div class="content-card">
        <h2>🌙 كيس الصائم</h2>

        <div class="alert-box">
            ⚠️ تنبيه: يتم توزيع كيس الصائم فقط خلال شهر رمضان المبارك. التسجيل مغلق حالياً.
        </div>

        <div class="closed-form">
            <input type="text" placeholder="الاسم الكامل" disabled>
            <input type="text" placeholder="رقم الهاتف" disabled>
            <input type="text" placeholder="المنطقة" disabled>
            <button class="btn-disabled">إرسال الطلب (مغلق)</button>
        </div>

        <br>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

</body>
</html>

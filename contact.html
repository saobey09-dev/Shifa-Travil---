<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيفا للسفر والسياحة - تواصل معنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية الموقع مع طبقة تغميق خفيفة لبروز النصوص */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('contact_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 35px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo-placeholder {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
        }

        .description {
            color: #d1d5db;
            font-size: 0.95rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .contact-method {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ألوان الهوية البصرية للأزرار */
        .whatsapp { background: rgba(37, 211, 102, 0.85); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .email { background: rgba(234, 67, 53, 0.85); box-shadow: 0 4px 15px rgba(234, 67, 53, 0.2); }
        .facebook { background: rgba(24, 119, 242, 0.85); box-shadow: 0 4px 15px rgba(24, 119, 242, 0.2); }

        .btn-link:active {
            transform: scale(0.96);
        }

        .btn-link i {
            font-size: 1.4rem;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">
            <i class="fas fa-paper-plane"></i>
        </div>

        <h2>شيفا للسفر والسياحة</h2>
        <p class="description">نسعد بخدمتكم وتلقي استفساراتكم عبر قنواتنا الرسمية:</p>

        <div class="contact-method">

            <a href="https://wa.me/966551655706" class="btn-link whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> مراسلة عبر الواتساب
            </a>

            <a href="mailto:musab.ibrahim1@icloud.com" class="btn-link email">
                <i class="fas fa-envelope"></i> البريد الإلكتروني
            </a>

            <a href="https://www.facebook.com/share/1XEa2UB6SK/?mibextid=wwXIfr" target="_blank" class="btn-link facebook">
                <i class="fab fa-facebook-f"></i> تابعنا على فيسبوك
            </a>

        </div>

        <p class="footer-text">إدارة: مصعب ابراهيم الشفيع</p>
    </div>

</body>
</html>

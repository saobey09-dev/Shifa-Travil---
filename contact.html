<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('contact_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: #333;
        }
        h2 { color: #1a5276; margin-bottom: 25px; }

        .contact-method {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            color: white;
        }

        /* ألوان الهوية البصرية للروابط */
        .whatsapp { background: #25d366; }
        .whatsapp:hover { background: #128c7e; transform: scale(1.02); }

        .email { background: #34495e; }
        .email:hover { background: #2c3e50; transform: scale(1.02); }

        .facebook { background: #1877f2; }
        .facebook:hover { background: #145dbf; transform: scale(1.02); }

        .btn-back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-back:hover { color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>تواصل مع شفا ترافيل 📞</h2>
    <p style="color: #666; margin-bottom: 25px; font-size: 14px;">يسعدنا تواصلكم معنا عبر الوسائل الرسمية التالية:</p>

    <div class="contact-method">
        <a href="https://wa.me/966551655706" class="btn-link whatsapp">
            <i class="fab fa-whatsapp"></i> مراسلة عبر الواتساب
        </a>

        <a href="mailto:musab.ibrahim1@icloud.com" class="btn-link email">
            <i class="fas fa-envelope"></i> البريد الإلكتروني
        </a>

        <a href="https://www.facebook.com/share/1BFRDgWsCn/?mibextid=wwXIfr" target="_blank" class="btn-link facebook">
            <i class="fab fa-facebook-f"></i> تابعنا على فيسبوك
        </a>
    </div>

    <a href="index.html" class="btn-back">
        <i class="fas fa-arrow-right"></i> العودة للقائمة الرئيسية
    </a>
</div>

</body>
</html>

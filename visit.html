<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الزيارة - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('visit_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: #333;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }

        .visit-types {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 5px;
        }
        .type-btn {
            background: #f1f2f6;
            border: 2px solid #ddd;
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            flex: 1;
            transition: 0.3s;
        }
        .type-btn.active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .form-section { display: none; text-align: right; animation: fadeIn 0.5s; }
        .form-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>خدمات الزيارات 🛂</h2>

    <div class="visit-types">
        <button class="type-btn active" onclick="showForm('personal', this)">زيارة شخصية</button>
        <button class="type-btn" onclick="showForm('business', this)">زيارة أعمال</button>
        <button class="type-btn" onclick="showForm('tourism', this)">زيارة سياحية</button>
    </div>

    <form id="visitForm">
        <input type="hidden" id="selectedType" value="زيارة شخصية">

        <div class="form-group">
            <label>الاسم الرباعي:</label>
            <input type="text" id="fullName" placeholder="أدخل اسمك الكامل" required>
        </div>

        <div class="form-group">
            <label>صورة الجواز (ملف أو صورة):</label>
            <input type="file" id="passport" accept="image/*,.pdf" required>
        </div>

        <button type="submit" class="btn-submit">تقديم الطلب والانتقال للواتساب</button>
    </form>

    <a href="index.html" class="btn-back">العودة للقائمة الرئيسية</a>
</div>

<script>
    // تبديل أنواع الزيارة
    function showForm(type, btn) {
        // تحديث الأزرار
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // تحديث النوع المختار
        const typeNames = {
            'personal': 'زيارة شخصية',
            'business': 'زيارة أعمال',
            'tourism': 'زيارة سياحية'
        };
        document.getElementById('selectedType').value = typeNames[type];
    }

    // إرسال البيانات للواتساب
    document.getElementById('visitForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const type = document.getElementById('selectedType').value;
        const name = document.getElementById('fullName').value;
        const whatsappNumber = "249XXXXXXXXX"; // ضع رقم الواتساب الخاص بك هنا

        alert("سيتم تحويلك الآن إلى الواتساب لتقديم طلب: " + type);

        const message = `مرحباً شفا ترافيل، أرغب في التقديم على (${type}).%0Aالاسم: ${name}%0Aلقد قمت بإرفاق صورة الجواز في الموقع.`;

        window.location.href = `https://wa.me/${whatsappNumber}?text=${message}`;
    });
</script>

</body>
</html>

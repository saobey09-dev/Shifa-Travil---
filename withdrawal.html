<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب عمرة رمضان المجانية - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* إضافة صورة الخلفية هنا */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('omra_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.95); /* خلفية بيضاء شفافة قليلاً */
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(5px); /* تأثير ضبابي خلف النموذج */
        }
        .alert-top {
            background: #ffd700;
            color: #000;
            padding: 8px;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 15px;
            border-radius: 50px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h2 { color: #1a5276; margin: 10px 0; font-size: 24px; }
        .main-desc { color: #555; font-size: 14px; line-height: 1.6; }
        .notice {
            background: #fff0f0;
            color: #c0392b;
            border-right: 5px solid #e74c3c;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            margin: 15px 0;
            font-weight: bold;
        }
        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            background: #fff;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn-submit {
            flex: 2;
            background: #1a5276;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #154360; }
        .btn-back {
            flex: 1;
            background: #ecf0f1;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="alert-top">🌟 اقترب موعد السحب السنوي لرحلة العمرة 🌟</div>

    <h2>سحب عمرة رمضان 🌙</h2>
    <p class="main-desc">فرصتك لزيارة بيت الله الحرام في شهر الخير مجاناً.</p>

    <div class="notice">
        📍 تنبيه: المشاركة حصرياً للسودانيين فقط.
    </div>

    <form id="drawForm">
        <div class="form-group">
            <label>الاسم الرباعي الكامل:</label>
            <input type="text" id="fullName" placeholder="كما هو مدون في الجواز" required>
        </div>

        <div class="form-group">
            <label>إرفاق صورة الجواز (أو الهوية):</label>
            <input type="file" id="passportFile" accept="image/*,.pdf" required>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit">تأكيد الاشتراك في السحب</button>
            <a href="index.html" class="btn-back">رجوع</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('drawForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('fullName').value;
        alert("شكراً لك يا " + name + ".\nتم تسجيل بياناتك بنجاح. سيتم التواصل مع الفائز عبر القنوات الرسمية. نسأل الله لنا ولكم التوفيق.");
        window.location.href = 'index.html';
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمة السحب - شيفا للسفر</title>
    <style>
        body { background-color: #4db8ff; font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .title-en { font-size: 35px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .title-ar { font-size: 38px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .content-card {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .info-box {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: right;
            line-height: 1.6;
        }

        .alert-security {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .whatsapp-btn {
            display: block;
            background: #25D366;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: #000;
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="title-en">✈️ Shifaa Travel</div>
        <div class="title-ar">شيفا للسفر والسياحة ✈️</div>
    </div>

    <div class="content-card">
        <h2>💳 خدمة السحب النقدي</h2>

        <div class="info-box">
            • نوفر خدمة السحب عبر التطبيقات البنكية.<br>
            • عمولات منافسة وسرعة في التنفيذ.<br>
            • الخدمة متوفرة خلال ساعات العمل الرسمية.
        </div>

        <div class="alert-security">
            🔒 ملاحظة أمنية: عمليات السحب تتطلب إبراز الهوية الشخصية الأصلية لصاحب الحساب.
        </div>

        <a href="https://wa.me/249XXXXXXXXX" class="whatsapp-btn">طلب سحب الآن 💬</a>

        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رخصة القيادة الدولية - شيفا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('license_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-screen {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            min-height: 100vh;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 35px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .back-btn {
            position: absolute;
            right: 20px;
            top: 25px;
            color: white;
            text-decoration: none;
        }

        .form-container {
            padding: 25px;
        }

        .alert-box {
            background: #e0f2fe;
            color: #0369a1;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            border-right: 5px solid var(--accent);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            background: #25d366;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* نافذة الشروط */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 85%;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }

        .condition {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            text-align: right;
        }

        .confirm-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i></a>
            <h2>رخصة القيادة الدولية</h2>
        </div>

        <div class="form-container">
            <div class="alert-box">
                <i class="fas fa-info-circle"></i>
                تنبيه: رخصة القيادة الدولية لدينا مدتها عام وقابلة للتجديد.
            </div>

            <div class="input-group">
                <label>الاسم الرباعي</label>
                <input type="text" id="fullName" placeholder="أدخل اسمك بالكامل">
            </div>

            <button class="submit-btn" onclick="showConditions()">
                <i class="fab fa-whatsapp"></i> التكملة عبر الواتساب
            </button>
        </div>
    </div>

    <div id="conditionsModal" class="modal">
        <div class="modal-content">
            <h3>شروط الرخصة</h3>
            <div class="condition"><i class="fas fa-check text-success"></i> العمر فوق 18 عاماً</div>
            <div class="condition"><i class="fas fa-check text-success"></i> خلفية جيدة عن القيادة</div>
            <div class="condition"><i class="fas fa-check text-success"></i> حالة صحية جيدة</div>
            <button class="confirm-btn" onclick="executeProcess()">موافق وإرسال الطلب</button>
        </div>
    </div>

    <script>
        function showConditions() {
            const name = document.getElementById('fullName').value;
            if (name.trim().length < 10) {
                alert("يرجى إدخال الاسم الرباعي للتكملة");
                return;
            }
            document.getElementById('conditionsModal').style.display = 'flex';
        }

        function executeProcess() {
            const name = document.getElementById('fullName').value;
            const egyptPhone = "201503058070"; // رقم شركة الرخص
            const saudiPhone = "966551655706"; // رقمك الخاص للتنبيه

            // 1. رسالة العميل للشركة المصرية
            const clientMsg = encodeURIComponent(`مرحباً شيفا للسفر والسياحة، أريد رخصة قيادة دولية.\nالاسم: ${name}`);

            // 2. رسالة التنبيه المخفية لك (تفتح في نافذة صغيرة وتغلق أو تعمل في الخلفية)
            const adminNotifyMsg = encodeURIComponent(`تنبيه من الموقع: عميل جديد ( ${name} ) انتقل الآن لمراسلة شركة الرخص الدولية.`);

            // فتح واتساب العميل (الرقم المصري)
            window.open(`https://wa.me/${egyptPhone}?text=${clientMsg}`, '_blank');

            // تنبيهك أنت (سيفتح نافذة سريعة لرقمك السعودي)
            // ملاحظة: قد يطلب المتصفح إذن "Pop-up" لأول مرة فقط
            setTimeout(() => {
                window.location.href = `https://wa.me/${saudiPhone}?text=${adminNotifyMsg}`;
            }, 500);
        }
    </script>
</body>
</html>

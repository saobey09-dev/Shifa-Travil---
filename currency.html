<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة تبديل العملات - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('money_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: #333;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        
        .form-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #edeff2;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Cairo';
            font-size: 16px;
        }

        .swap-icon {
            font-size: 24px;
            margin: 10px 0;
            color: #27ae60;
        }

        .btn-submit {
            width: 100%;
            background: #25d366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #128c7e; transform: translateY(-2px); }
        
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
            border-bottom: 1px solid #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تبديل العملات 💳</h2>
    <p style="font-size: 14px; color: #666; margin-bottom: 20px;">أدخل المبلغ واختر العملات للتحويل والاستفسار عن السعر اللحظي.</p>

    <form id="currencyForm">
        <div class="form-group">
            <label>المبلغ المراد تحويله:</label>
            <input type="number" id="amount" placeholder="0.00" required min="1">
        </div>

        <div class="form-group">
            <label>من عملة:</label>
            <select id="fromCurrency">
                <option value="دولار أمريكي">دولار أمريكي ($)</option>
                <option value="ريال سعودي">ريال سعودي (SAR)</option>
                <option value="جنيه مصري">جنيه مصري (EGP)</option>
                <option value="جنيه سوداني">جنيه سوداني (SDG)</option>
                <option value="درهم إماراتي">درهم إماراتي (AED)</option>
            </select>
        </div>

        <div class="swap-icon">⬇️</div>

        <div class="form-group">
            <label>إلى عملة:</label>
            <select id="toCurrency">
                <option value="جنيه سوداني">جنيه سوداني (SDG)</option>
                <option value="ريال سعودي">ريال سعودي (SAR)</option>
                <option value="دولار أمريكي">دولار أمريكي ($)</option>
                <option value="جنيه مصري">جنيه مصري (EGP)</option>
                <option value="درهم إماراتي">درهم إماراتي (AED)</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">تواصل لمعرفة السعر والتبديل</button>
    </form>

    <a href="index.html" class="btn-back">العودة للقائمة الرئيسية</a>
</div>

<script>
    document.getElementById('currencyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const amount = document.getElementById('amount').value;
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        
        const myWhatsApp = "249XXXXXXXXX"; // ضع رقمك هنا بدون علامة +

        alert("سيتم توجيهك للواتساب لمعرفة سعر الصرف الحالي وإتمام التحويل.");

        const msg = `مرحباً شفا ترافيل، أرغب في تبديل عملة.%0A` +
                    `المبلغ: ${amount}%0A` +
                    `من: ${from}%0A` +
                    `إلى: ${to}%0A` +
                    `كم سعر الصرف الحالي لديكم؟`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>

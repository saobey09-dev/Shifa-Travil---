<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيفا للسفر والسياحة - Shifa App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
        }

        /* حاوية الجوال */
        .app-container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* الهيدر العلوي */
        .app-header {
            background: linear-gradient(135deg, #005682, #0084ad);
            padding: 30px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .app-header img {
            width: 90px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }

        .app-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* شبكة الأزرار (التسعة) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px;
            margin-top: -20px;
        }

        .menu-item {
            background: white;
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #eee;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            border-color: #0084ad;
        }

        .menu-item i {
            font-size: 24px;
            color: #0084ad;
            margin-bottom: 10px;
        }

        .menu-item span {
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* التذييل (الإدارة) */
        .app-footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            background: #f9f9f9;
        }

        .management {
            font-size: 0.95rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-row a {
            color: #0084ad;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <img src="logo.png" alt="شيفا للسفر">
            <h1>شيفا للسفر والسياحة</h1>
        </div>

        <div class="menu-grid">
            <a href="contracts.html" class="menu-item">
                <i class="fas fa-file-signature"></i>
                <span>العقود</span>
            </a>
            <a href="tickets.html" class="menu-item">
                <i class="fas fa-plane-departure"></i>
                <span>التذاكر</span>
            </a>
            <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر" class="menu-item">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-passport"></i>
                <span>التأشيرات</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-hotel"></i>
                <span>الفنادق</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-briefcase"></i>
                <span>التوظيف</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-car"></i>
                <span>سياحة</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-info-circle"></i>
                <span>عن المكتب</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-headset"></i>
                <span>الدعم</span>
            </a>
        </div>

        <div class="app-footer">
            <div class="management">إدارة: مصعب إبراهيم الشفيع</div>
            <div class="social-row">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

</body>
</html>

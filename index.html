<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شفا للسفر والسياحة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; /* أزرق ملكي */
            --accent: #3b82f6;
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('main_bg.jpg'); /* استخدام ملفك الموجود بالصور */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: rgba(240, 244, 248, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        /* الهيدر */
        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            margin-bottom: 10px;
        }

        .header h1 { margin: 5px 0; font-size: 1.4rem; }
        .header p { margin: 0; font-size: 0.85rem; opacity: 0.9; }

        /* شبكة الأزرار - 9 أزرار */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: -20px;
            flex-grow: 1;
        }

        /* جعل أزرار معينة تأخذ عرضاً كاملاً إذا أردت تنسيقاً مختلفاً، لكن هنا سنلتزم بطلبك */
        .menu-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .menu-item:active { transform: scale(0.95); }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.4rem;
            color: var(--accent);
        }

        .menu-item span { font-weight: bold; font-size: 0.9rem; }

        /* تذييل الصفحة */
        .footer {
            text-align: center;
            padding: 20px;
            background: var(--primary);
            color: white;
            font-size: 0.9rem;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <img src="logo.png" alt="شفا" class="logo-img">
            <h1>شفا للسفر والسياحة</h1>
            <p>بوابتكم لخدمات السفر المتكاملة</p>
        </div>

        <div class="menu-grid">

            <a href="umrah.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-kaaba"></i></div>
                <span>الحج والعمرة</span>
            </a>

            <a href="tickets.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-ticket-alt"></i></div>
                <span>التذاكر</span>
            </a>

            <a href="contracts.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-file-signature"></i></div>
                <span>الإقامات والعقود</span>
            </a>

            <a href="visit.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-passport"></i></div>
                <span>الزيارات</span>
            </a>

            <a href="shipping.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-box-open"></i></div>
                <span>الإرساليات</span>
            </a>

            <a href="currency.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-coins"></i></div>
                <span>العملات</span>
            </a>

            <a href="license.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-id-card"></i></div>
                <span>الرخصة الدولية</span>
            </a>

            <a href="fasting.html" class="menu-item">
                <div class="icon-circle"><i class="fas fa-hand-holding-heart"></i></div>
                <span>كيس الصايم</span>
            </a>

            <a href="contact.html" class="menu-item" style="grid-column: span 2;">
                <div class="icon-circle"><i class="fab fa-whatsapp"></i></div>
                <span>تواصل معنا</span>
            </a>

        </div>

        <div class="footer">
            إدارة: مصعب ابراهيم الشفيع
        </div>
    </div>

</body>
</html>

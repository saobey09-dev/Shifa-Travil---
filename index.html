<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شفا ترافيل - Shifa Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a73e8;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: white;
            min-height: 100vh;
            box-shadow: var(--shadow);
            position: relative;
        }

        /* الهيدر الاحترافي */
        .header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 0.9rem; }

        /* شبكة الأزرار */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: -30px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background-color: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .icon-box i {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .menu-item span {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>شفا ترافيل</h1>
            <p>أهلاً بك في خدماتك الإلكترونية</p>
        </div>

        <div class="menu-grid">

            <a href="license.html" class="menu-item">
                <div class="icon-box">
                    <i class="fas fa-id-card"></i>
                </div>
                <span>رخصة القيادة</span>
            </a>

            <div class="menu-item">
                <div class="icon-box">
                    <i class="fas fa-plane"></i>
                </div>
                <span>حجز طيران</span>
            </div>

            <div class="menu-item">
                <div class="icon-box">
                    <i class="fas fa-hotel"></i>
                </div>
                <span>حجز فنادق</span>
            </div>

            <div class="menu-item">
                <div class="icon-box">
                    <i class="fas fa-headset"></i>
                </div>
                <span>الدعم الفني</span>
            </div>

        </div>

        <div class="footer">
            &copy; 2024 Shifa Travel - جميع الحقوق محفوظة
        </div>
    </div>

</body>
</html>

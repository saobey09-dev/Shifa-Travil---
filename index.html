<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شفا ترافيل - Shifa Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a5276;
            --accent-color: #3498db;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* يمنع التمرير الخارجي لتبدو كأنها تطبيق */
            font-family: 'Cairo', sans-serif;
        }

        /* الخلفية الثابتة للموقع بالكامل */
        .app-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('main_bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 500px; /* لضمان شكل التطبيق على الكمبيوتر أيضاً */
            margin: 0 auto;
            color: white;
        }

        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        /* شبكة الأيقونات لتشبه واجهة الهاتف */
        .menu-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: min-content;
            gap: 20px;
            padding: 20px;
            overflow-y: auto; /* يسمح بالتمرير داخل الأزرار فقط إذا زاد عددها */
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.9); /* تأثير الضغط مثل التطبيقات */
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); /* تأثير الزجاج الشفاف */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px; /* زوايا دائرية تشبه آيفون وأندرويد */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .menu-item span {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 11px;
            opacity: 0.7;
        }

        /* تخصيص للشاشات الصغيرة جداً */
        @media (max-width: 360px) {
            .icon-wrapper { width: 60px; height: 60px; font-size: 28px; }
            .menu-grid { gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="app-background"></div>

    <div class="app-container">
        <header>
            <h1>شفا ترافيل ✈️</h1>
            <p>خدمات سفر متكاملة بين يديك</p>
        </header>

        <nav class="menu-grid">

            <a href="tickets.html" class="menu-item">
                <div class="icon-wrapper">🎟️</div>
                <span>حجز تذاكر</span>
            </a>

            <a href="visit.html" class="menu-item">
                <div class="icon-wrapper">🛂</div>
                <span>زيارات</span>
            </a>

            <a href="contracts.html" class="menu-item">
                <div class="icon-wrapper">💼</div>
                <span>عقود عمل</span>
            </a>

            <a href="currency.html" class="menu-item">
                <div class="icon-wrapper">💳</div>
                <span>عملات</span>
            </a>

            <a href="transfers.html" class="menu-item">
                <div class="icon-wrapper">📦</div>
                <span>إرساليات</span>
            </a>

            <a href="fasting.html" class="menu-item">
                <div class="icon-wrapper">🌙</div>
                <span>كيس الصائم</span>
            </a>

            <a href="withdrawal.html" class="menu-item">
                <div class="icon-wrapper">🕋</div>
                <span>سحب العمرة</span>
            </a>

            <a href="contact.html" class="menu-item">
                <div class="icon-wrapper">📞</div>
                <span>تواصل معنا</span>
            </a>

            <div class="menu-item" style="opacity: 0.4;">
                <div class="icon-wrapper">✨</div>
                <span>قريباً</span>
            </div>

        </nav>

        <footer>
            &copy; 2026 شفا ترافيل | تصميم احترافي للسفر
        </footer>
    </div>

</body>
</html>

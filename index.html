<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيفا للسفر والسياحة - إدارة مصعب إبراهيم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* خلفية الفيديو */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* الهيدر مع اللوجو والاسم */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            position: relative;
            z-index: 10;
        }

        .header img {
            height: 65px;
            margin-left: 15px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }

        /* القائمة الجانبية */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            text-align: right;
        }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            color: #ccc;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .openbtn {
            font-size: 25px;
            cursor: pointer;
            background-color: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 15px;
            border: 1px solid white;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 101;
            border-radius: 5px;
        }

        /* حاوية الأزرار */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 65%;
            position: relative;
            z-index: 5;
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 85%;
            max-width: 900px;
        }

        .btn {
            padding: 18px;
            font-size: 1.1rem;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            text-decoration: none;
            text-align: center;
            transition: 0.4s;
            backdrop-filter: blur(8px);
        }

        .btn:hover {
            background: white;
            color: #003a5c;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* تذييل الصفحة (الفوتر) مع اسم الإدارة */
        .footer-info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
        }

        .management-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }

        .social-icons a {
            color: white;
            font-size: 1.6rem;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: #00c3ff;
            transform: scale(1.2);
        }

    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="viedu.mp4" type="video/mp4">
    </video>

    <div class="header">
        <img src="logo.png" alt="لوجو شيفا">
        <h1>شيفا للسفر والسياحة</h1>
    </div>

    <button class="openbtn" onclick="toggleNav()">☰</button>
    <div id="mySidebar" class="sidebar">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="contracts.html"><i class="fas fa-file-contract"></i> قسم العقود</a>
        <a href="tickets.html"><i class="fas fa-plane"></i> حجز تذاكر</a>
        <a href="#"><i class="fas fa-headset"></i> الدعم الفني</a>
    </div>

    <div class="container">
        <div class="btn-container">
            <a href="contracts.html" class="btn">قسم العقود والتوظيف</a>
            <a href="tickets.html" class="btn">حجز طيران وفنادق</a>
            <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر%2C%20أرخص%20عروضكم%20الحالية" class="btn" target="_blank">تواصل معنا واتساب</a>
            <a href="#" class="btn">خدمات التأشيرات</a>
        </div>
    </div>

    <div class="footer-info">
        <div class="management-name">إدارة: مصعب إبراهيم الشفيع</div>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <script>
        function toggleNav() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.width === "250px") {
                sidebar.style.width = "0";
            } else {
                sidebar.style.width = "250px";
            }
        }
    </script>

</body>
</html>

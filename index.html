<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيفا للسفر والسياحة - Shifa Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-image: url('main_bg.jpg'); /* الخلفية الأصلية */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.4);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .app-header {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .app-header img {
            width: 110px;
            height: auto;
            margin-bottom: 10px;
        }

        .app-header h1 {
            margin: 0;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
            margin-top: -10px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px 5px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .menu-item i {
            font-size: 24px;
            color: #00c3ff;
            margin-bottom: 8px;
        }

        .menu-item span {
            font-size: 0.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .app-footer {
            margin-top: auto;
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            color: white;
        }

        .management {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-row a {
            color: #00c3ff;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <img src="logo.png" alt="شيفا للسفر">
            <h1>شيفا للسفر والسياحة</h1>
        </div>

        <div class="menu-grid">
            <a href="umrah.html" class="menu-item">
                <i class="fas fa-kaaba"></i>
                <span>الحج والعمرة</span>
            </a>
            <a href="contracts.html" class="menu-item">
                <i class="fas fa-file-signature"></i>
                <span>عقود عمل</span>
            </a>
            <a href="tickets.html" class="menu-item">
                <i class="fas fa-plane-departure"></i>
                <span>حجز تذاكر</span>
            </a>

            <a href="shipping.html" class="menu-item">
                <i class="fas fa-box-open"></i>
                <span>إرساليات</span>
            </a>
            <a href="currency.html" class="menu-item">
                <i class="fas fa-comments-dollar"></i>
                <span>تحويل عملة</span>
            </a>
            <a href="visit.html" class="menu-item">
                <i class="fas fa-passport"></i>
                <span>الزيارات</span>
            </a>

            <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر" class="menu-item">
                <i class="fab fa-whatsapp"></i>
                <span>تواصل معنا</span>
            </a>
            <a href="withdrawal.html" class="menu-item">
                <i class="fas fa-ticket-alt"></i>
                <span>سحب عمره</span>
            </a>
            <a href="fasting.html" class="menu-item">
                <i class="fas fa-moon"></i>
                <span>كيس الصائم</span>
            </a>
        </div>

        <div class="app-footer">
            <div class="management">إدارة: مصعب إبراهيم الشفيع</div>
            <div class="social-row">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/966551655706?text=مرحباً%20شيفا%20للسفر"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

</body>
</html>

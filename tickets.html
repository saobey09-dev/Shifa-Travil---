<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجز تذاكر - شيفا للسفر</title>
    <style>
        body { background-color: #4db8ff; font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .title-en { font-size: 35px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .title-ar { font-size: 38px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .content-card { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .back-btn { margin-top: 20px; display: inline-block; padding: 10px 20px; background: #000; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="logo-section">
        <div class="title-en">✈️ Shifaa Travel</div>
        <div class="title-ar">شيفا للسفر والسياحة ✈️</div>
    </div>
    <div class="content-card">
        <h2>✈️ حجز تذاكر طيران</h2>
        <p>اختر نوع الرحلة ووجهتك:</p>
        <select>
            <option>طيران داخلي</option>
            <option>طيران دولي</option>
        </select>
        <input type="text" placeholder="من أين؟">
        <input type="text" placeholder="إلى أين؟">
        <button style="background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer;">استعلام عن السعر</button>
        <br><br>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>
</body>
</html>

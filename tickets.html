<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز التذاكر - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('tickets_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 95%;
            max-width: 600px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #333;
            margin: 20px;
        }
        h2 { text-align: center; color: #1a5276; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }

        .main-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ecf0f1; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }

        .sub-selection { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; }
        .sub-selection.active { display: block; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: right; }
        .full-width { grid-column: span 2; }

        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Cairo'; }

        .price-notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; border: 1px solid #ffeeba; }

        .btn-submit { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-back { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>حجز تذاكر السفر ✈️🚢</h2>

    <div class="price-notice">⚠️ ملاحظة: الأسعار متغيرة، سيتم تأكيد السعر النهائي عبر الواتساب فور استلام طلبك.</div>

    <div class="main-tabs">
        <button class="tab-btn active" onclick="setTravelMode('جواً', this)">سفر جواً ✈️</button>
        <button class="tab-btn" onclick="setTravelMode('بحراً', this)">سفر بحراً 🚢</button>
    </div>

    <div id="airOptions" class="sub-selection active">
        <label>نوع الرحلة الجوية:</label>
        <select id="airType" onchange="updateCities()">
            <option value="دولي">طيران دولي (خارجي)</option>
            <option value="داخلي">طيران داخلي</option>
        </select>
    </div>

    <form id="ticketForm">
        <input type="hidden" id="travelMode" value="جواً">

        <div class="form-grid">
            <div class="form-group">
                <label>من:</label>
                <select id="fromCity"></select>
            </div>
            <div class="form-group">
                <label>إلى:</label>
                <select id="toCity"></select>
            </div>

            <div class="form-group">
                <label>عدد التذاكر:</label>
                <input type="number" id="ticketCount" value="1" min="1">
            </div>
            <div class="form-group">
                <label>فئة المسافرين:</label>
                <select id="passengerType">
                    <option>بالغ (Adult)</option>
                    <option>طفل (Child)</option>
                    <option>امرأة ورضيع (Infant)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الطلب (واتساب)</button>
    </form>

    <a href="index.html" class="btn-back">العودة للقائمة الرئيسية</a>
</div>

<script>
    const cities = {
        international: ["القاهرة", "طرابلس", "تونس", "الجزائر", "الرباط", "نواكشوط", "مقديشو", "جيبوتي", "الرياض", "الكويت", "الدوحة", "أبوظبي", "مسقط", "المنامة"],
        internal: ["الخرطوم", "بورتسودان", "أبها", "جدة", "المدينة المنورة", "الرياض", "الدمام"],
        sea: ["ميناء جدة", "ميناء سواكن"]
    };

    function setTravelMode(mode, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('travelMode').value = mode;

        const airOptions = document.getElementById('airOptions');
        if(mode === 'جواً') {
            airOptions.classList.add('active');
            updateCities();
        } else {
            airOptions.classList.remove('active');
            fillSelect('fromCity', cities.sea);
            fillSelect('toCity', cities.sea);
        }
    }

    function updateCities() {
        const type = document.getElementById('airType').value;
        const list = type === 'دولي' ? cities.international : cities.internal;
        fillSelect('fromCity', list);
        fillSelect('toCity', list);
    }

    function fillSelect(id, list) {
        const select = document.getElementById(id);
        select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // تشغيل القائمة لأول مرة
    updateCities();

    document.getElementById('ticketForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const mode = document.getElementById('travelMode').value;
        const from = document.getElementById('fromCity').value;
        const to = document.getElementById('toCity').value;
        const count = document.getElementById('ticketCount').value;
        const type = document.getElementById('passengerType').value;

        const myWhatsApp = "966551655706";

        const msg = `طلب حجز تذكرة (${mode})%0A` +
                    `من: ${from}%0A` +
                    `إلى: ${to}%0A` +
                    `العدد: ${count}%0A` +
                    `الفئة: ${type}%0A` +
                    `يرجى إفادتي بالسعر الحالي.`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>

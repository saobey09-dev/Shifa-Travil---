<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجز التذاكر - شيفا للسفر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5276;
            --accent: #3498db;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('tickets_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 92%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .main-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; background: #f0f2f5; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 14px; color: var(--primary); text-align: right; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; font-size: 15px; background: #fff; }

        .price-notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-align: center; border: 1px solid #ffeeba; }

        .btn-submit { width: 100%; background: #27ae60; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
        .btn-back { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>حجز تذاكر السفر ✈️🚢</h2>
    
    <div class="price-notice">⚠️ ملاحظة: الأسعار متغيرة، سيتم تأكيد السعر النهائي عبر الواتساب فور استلام طلبك.</div>

    <div class="main-tabs">
        <button id="airTab" class="tab-btn active" onclick="setTravelMode('جواً')">سفـر جـواً ✈️</button>
        <button id="seaTab" class="tab-btn" onclick="setTravelMode('بحراً')">سفـر بحـراً 🚢</button>
    </div>

    <form id="ticketForm">
        <input type="hidden" id="travelMode" value="جواً">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>مـن:</label>
                <select id="fromCity"></select>
            </div>
            <div class="form-group">
                <label>إلـى:</label>
                <select id="toCity"></select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>بكم تذكرة تطلب؟</label>
                <input type="number" id="ticketCount" value="1" min="1">
            </div>
            <div class="form-group">
                <label>نوع المسافر:</label>
                <select id="passengerType">
                    <option>بالغ</option>
                    <option>طفل</option>
                    <option>امرأة ورضيع</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الطلب (واتساب)</button>
    </form>

    <a href="index.html" class="btn-back">🔙 الرجوع للقائمة الرئيسية</a>
</div>

<script>
    const cities = {
        // قائمة جوية موحدة (داخلي ودولي)
        air: ["الرياض", "جدة", "الدمام", "أبها", "المدينة المنورة", "الخرطوم", "بورتسودان", "القاهرة", "دبي", "الدوحة", "الكويت", "المنامة", "مسقط", "عمان", "طرابلس", "تونس", "الجزائر", "الرباط", "نواكشوط", "جيبوتي", "مقديشو"],
        // قائمة بحرية محصورة
        sea: ["ميناء جدة", "ميناء سواكن"]
    };

    function setTravelMode(mode) {
        document.getElementById('travelMode').value = mode;
        const airTab = document.getElementById('airTab');
        const seaTab = document.getElementById('seaTab');

        if (mode === 'جواً') {
            airTab.classList.add('active');
            seaTab.classList.remove('active');
            fillSelect('fromCity', cities.air);
            fillSelect('toCity', cities.air);
        } else {
            seaTab.classList.add('active');
            airTab.classList.remove('active');
            fillSelect('fromCity', cities.sea);
            fillSelect('toCity', cities.sea);
        }
    }

    function fillSelect(id, list) {
        const select = document.getElementById(id);
        select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // تشغيل القائمة الجوية كخيار افتراضي
    fillSelect('fromCity', cities.air);
    fillSelect('toCity', cities.air);

    document.getElementById('ticketForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const mode = document.getElementById('travelMode').value;
        const from = document.getElementById('fromCity').value;
        const to = document.getElementById('toCity').value;
        const count = document.getElementById('ticketCount').value;
        const type = document.getElementById('passengerType').value;
        
        const myWhatsApp = "966551655706"; 

        const msg = `حجز تذكرة جديد (${mode}) 🎫%0A` +
                    `من: ${from}%0A` +
                    `إلى: ${to}%0A` +
                    `عدد التذاكر: ${count}%0A` +
                    `الفئة: ${type}%0A` +
                    `--------------------%0A` +
                    `يرجى موافاتي بالسعر لإنهاء الحجز.`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>

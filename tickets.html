<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجز التذاكر - شيفا للسفر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5276;
            --accent: #3498db;
            --success: #27ae60;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('tickets_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 92%;
            max-width: 480px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
        }
        h2 { text-align: center; color: var(--primary); margin: 0 0 15px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .main-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; background: #f0f2f5; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; color: var(--primary); text-align: right; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Cairo'; background: #fff; }

        /* تنسيق عدادات المسافرين */
        .passenger-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .passenger-info span { font-size: 14px; font-weight: bold; color: #555; }
        .passenger-info small { display: block; font-size: 11px; color: #888; }

        .counter-controls { display: flex; align-items: center; gap: 15px; }
        .btn-count {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--primary);
            background: white;
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-count:active { background: var(--primary); color: white; }
        .count-value { font-weight: bold; font-size: 16px; min-width: 20px; text-align: center; }

        .price-notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; margin-bottom: 15px; border: 1px solid #ffeeba; }
        .btn-submit { width: 100%; background: var(--success); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #7f8c8d; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>حجز تذاكر السفر ✈️🚢</h2>

    <div class="price-notice">⚠️ الأسعار متغيرة، سيتم التأكيد النهائي عبر الواتساب.</div>

    <div class="main-tabs">
        <button id="airTab" class="tab-btn active" onclick="setTravelMode('جواً')">سفـر جـواً ✈️</button>
        <button id="seaTab" class="tab-btn" onclick="setTravelMode('بحراً')">سفـر بحـراً 🚢</button>
    </div>

    <form id="ticketForm">
        <input type="hidden" id="travelMode" value="جواً">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div class="form-group">
                <label>مـن:</label>
                <select id="fromCity"></select>
            </div>
            <div class="form-group">
                <label>إلـى:</label>
                <select id="toCity"></select>
            </div>
        </div>

        <label>عدد المسافرين:</label>
        <div class="passenger-row">
            <div class="passenger-info">
                <span>بالغ</span>
                <small>عمره 12+ سنة</small>
            </div>
            <div class="counter-controls">
                <button type="button" class="btn-count" onclick="changeCount('adult', -1)">-</button>
                <span id="adultCount" class="count-value">1</span>
                <button type="button" class="btn-count" onclick="changeCount('adult', 1)">+</button>
            </div>
        </div>

        <div class="passenger-row">
            <div class="passenger-info">
                <span>طفل</span>
                <small>عمره 2-12 سنة</small>
            </div>
            <div class="counter-controls">
                <button type="button" class="btn-count" onclick="changeCount('child', -1)">-</button>
                <span id="childCount" class="count-value">0</span>
                <button type="button" class="btn-count" onclick="changeCount('child', 1)">+</button>
            </div>
        </div>

        <div class="passenger-row">
            <div class="passenger-info">
                <span>رضيع</span>
                <small>أقل من سنتين</small>
            </div>
            <div class="counter-controls">
                <button type="button" class="btn-count" onclick="changeCount('infant', -1)">-</button>
                <span id="infantCount" class="count-value">0</span>
                <button type="button" class="btn-count" onclick="changeCount('infant', 1)">+</button>
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الطلب (واتساب)</button>
    </form>

    <a href="index.html" class="btn-back">🔙 الرجوع للقائمة الرئيسية</a>
</div>

<script>
    const cities = {
        air: ["الرياض", "جدة", "الدمام", "أبها", "المدينة المنورة", "الخرطوم", "بورتسودان", "القاهرة", "دبي", "الدوحة", "الكويت", "المنامة", "مسقط", "عمان", "طرابلس", "تونس", "الجزائر", "الرباط", "نواكشوط", "جيبوتي", "مقديشو"],
        sea: ["ميناء جدة", "ميناء سواكن"]
    };

    let counts = { adult: 1, child: 0, infant: 0 };

    function changeCount(type, delta) {
        let min = (type === 'adult') ? 1 : 0; // البالغين لا يقل عن 1
        counts[type] = Math.max(min, counts[type] + delta);
        document.getElementById(type + 'Count').innerText = counts[type];
    }

    function setTravelMode(mode) {
        document.getElementById('travelMode').value = mode;
        document.getElementById('airTab').classList.toggle('active', mode === 'جواً');
        document.getElementById('seaTab').classList.toggle('active', mode === 'بحراً');
        fillSelect('fromCity', mode === 'جواً' ? cities.air : cities.sea);
        fillSelect('toCity', mode === 'جواً' ? cities.air : cities.sea);
    }

    function fillSelect(id, list) {
        const select = document.getElementById(id);
        select.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // التهيئة
    setTravelMode('جواً');

    document.getElementById('ticketForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const mode = document.getElementById('travelMode').value;
        const from = document.getElementById('fromCity').value;
        const to = document.getElementById('toCity').value;

        let details = [];
        if(counts.adult > 0) details.push(`${counts.adult} بالغ`);
        if(counts.child > 0) details.push(`${counts.child} طفل`);
        if(counts.infant > 0) details.push(`${counts.infant} رضيع`);

        const myWhatsApp = "966551655706";
        const msg = `حجز تذكرة جديد (${mode}) 🎫%0A` +
                    `من: ${from}%0A` +
                    `إلى: ${to}%0A` +
                    `التفاصيل: ${details.join(' + ')}%0A` +
                    `--------------------%0A` +
                    `يرجى موافاتي بالسعر لإنهاء الحجز.`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>

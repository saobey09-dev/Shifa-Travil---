<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الارساليات - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('shipping_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: #333;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; border-bottom: 3px solid #e67e22; padding-bottom: 10px; }

        .warning-box {
            background: #fff5f5;
            color: #c0392b;
            border-right: 5px solid #e74c3c;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: right;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Cairo';
        }

        .city-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            background: #25d366; /* لون واتساب */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #128c7e; }

        .btn-back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>خدمة الارساليات والطرود 📦</h2>

    <div class="warning-box">
        ⚠️ تنبيه هام: لا نشحن المواد الزجاجية، المواد القابلة للكسر، السوائل، أو المأكولات.
    </div>

    <form id="shippingForm">
        <div class="form-group">
            <label>نوع الارسالية:</label>
            <input type="text" id="shipType" placeholder="مثلاً: ملابس، أوراق، إلكترونيات" required>
        </div>

        <div class="city-grid">
            <div class="form-group">
                <label>من مدينة:</label>
                <select id="fromCity">
                    <option value="جدة">جدة</option>
                    <option value="القاهرة">القاهرة</option>
                    <option value="بورتسودان">بورتسودان</option>
                    <option value="الخرطوم">الخرطوم</option>
                </select>
            </div>

            <div class="form-group">
                <label>إلى مدينة:</label>
                <select id="toCity">
                    <option value="بورتسودان">بورتسودان</option>
                    <option value="الخرطوم">الخرطوم</option>
                    <option value="جدة">جدة</option>
                    <option value="القاهرة">القاهرة</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الإرسالية (واتساب)</button>
    </form>

    <a href="index.html" class="btn-back">العودة للقائمة الرئيسية</a>
</div>

<script>
    document.getElementById('shippingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const type = document.getElementById('shipType').value;
        const from = document.getElementById('fromCity').value;
        const to = document.getElementById('toCity').value;

        const myWhatsApp = "249XXXXXXXXX"; // ضع رقمك هنا

        alert("سيتم تحويلك الآن لتأكيد تفاصيل الإرسالية عبر الواتساب.");

        const msg = `مرحباً شفا ترافيل، أرغب في طلب خدمة إرسالية.%0A` +
                    `نوع الغرض: ${type}%0A` +
                    `من: ${from}%0A` +
                    `إلى: ${to}%0A` +
                    `أؤكد أن الشحنة لا تحتوي على سوائل أو مواد قابلة للكسر.`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عقود - شيفا للسفر</title>
    <style>
        body {
            background-color: #4db8ff; /* نفس لون خلفية موقعك الأزرق */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تنسيق الشعار العلوي كما طلبته سابقاً */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .title-en { font-size: 35px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .title-ar { font-size: 38px; color: #000; font-weight: bold; -webkit-text-stroke: 1px #E0FFFF; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* صندوق المحتوى الأبيض */
        .content-card {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="title-en">✈️ Shifaa Travel</div>
        <div class="title-ar">شيفا للسفر والسياحة ✈️</div>
    </div>

    <div class="content-card">
        <h2>📄 قسم العقود</h2>
        <hr>
        <p>• عامل توصيل - راتب 2000</p>
        <p>• مدرس ابتدائي - منهج سوداني</p>
        <br>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإقامات وعقود العمل - شفا ترافيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('work_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 95%;
            max-width: 550px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
            margin: 20px 0;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 3px solid #f39c12; padding-bottom: 10px; }

        .choice-box {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .choice-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: #f8f9fa;
            transition: 0.3s;
            text-align: center;
        }
        .choice-btn.active {
            background: #f39c12;
            color: white;
            border-color: #e67e22;
        }

        .payment-alert {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #ffeeba;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: right;
        }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Cairo';
        }

        .btn-submit {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #219150; }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>الإقامات وعقود العمل 💼</h2>

    <div class="payment-alert">
        ⚠️ تنبيه مالي: يتم استلام نصف المبلغ عند البدء بالتنفيذ، والنصف الآخر يتم سداده مباشرة فور استلام العقد أو الإقامة.
    </div>

    <div class="choice-box">
        <div class="choice-btn active" onclick="setMode('إقامة حرة', this)">إقامة حرة</div>
        <div class="choice-btn" onclick="setMode('عقد عمل', this)">عقد عمل</div>
    </div>

    <form id="workForm">
        <input type="hidden" id="selectedMode" value="إقامة حرة">

        <div class="form-grid">
            <div class="form-group full-width">
                <label>الاسم الرباعي:</label>
                <input type="text" id="name" placeholder="أدخل اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label>الجنسية:</label>
                <input type="text" id="nationality" placeholder="مثلاً: سوداني" required>
            </div>

            <div class="form-group">
                <label>العمر:</label>
                <input type="number" id="age" placeholder="العمر" required>
            </div>

            <div class="form-group">
                <label>الحالة الاجتماعية:</label>
                <select id="socialStatus">
                    <option>عازب/ة</option>
                    <option>متزوج/ة</option>
                    <option>غير ذلك</option>
                </select>
            </div>

            <div class="form-group">
                <label>الحالة الصحية:</label>
                <input type="text" id="health" placeholder="سليم / يعاني من.." required>
            </div>

            <div class="form-group full-width">
                <label>إرفاق صورة الجواز (ملف أو صورة):</label>
                <input type="file" id="passport" accept="image/*,.pdf" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">إكمال الإجراء (تحويل للواتساب)</button>
    </form>

    <a href="index.html" class="btn-back">العودة للقائمة الرئيسية</a>
</div>

<script>
    function setMode(mode, btn) {
        document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('selectedMode').value = mode;
    }

    document.getElementById('workForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const mode = document.getElementById('selectedMode').value;
        const name = document.getElementById('name').value;
        const nationality = document.getElementById('nationality').value;
        const age = document.getElementById('age').value;
        const social = document.getElementById('socialStatus').value;
        const health = document.getElementById('health').value;

        const myWhatsApp = "249XXXXXXXXX"; // استبدل برقمك الخاص

        alert("سيتم تحويلك للواتساب لإكمال إجراءات " + mode);

        const msg = `مرحباً شفا ترافيل، أرغب في طلب (${mode}).%0A` +
                    `الاسم: ${name}%0A` +
                    `الجنسية: ${nationality}%0A` +
                    `العمر: ${age}%0A` +
                    `الحالة الاجتماعية: ${social}%0A` +
                    `الحالة الصحية: ${health}%0A` +
                    `لقد قمت برفع الجواز في الموقع.`;

        window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
    });
</script>

</body>
</html>

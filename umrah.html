<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحج والعمرة - شيفا للسفر</title>
    <style>
        body { background-image: url('kaaba.jpg'); background-size: cover; background-position: center; background-attachment: fixed; font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: -1; }
        .content-card { background: white; width: 95%; max-width: 600px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .alert-finance { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; border: 1px solid #ffeeba; }
        .main-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; color: white; }
        .hajj-btn { background: #1a5e20; } .umrah-btn { background: #bf9b30; }
        .form-section { display: none; text-align: right; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .madina-badge { background-color: #e8f5e9; color: #2e7d32; border: 1px dashed #2e7d32; padding: 8px; border-radius: 5px; font-size: 13px; margin-top: 5px; display: none; font-weight: bold; }
        .whatsapp-btn { background: #25D366; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 15px; text-align: center; }
        .back-btn { margin-top: 20px; display: inline-block; padding: 10px 20px; background: #000; color: white; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content-card">
        <div class="alert-finance">📢 إشعار: يتم استلام 50% قبل البدء، والباقي بعد الإتمام.</div>
        <div class="main-btns">
            <button class="tab-btn hajj-btn" onclick="showForm('hajj')">🕋 خدمات الحج</button>
            <button class="tab-btn umrah-btn" onclick="showForm('umrah')">🕌 خدمات العمرة</button>
        </div>
        <div id="hajj-form" class="form-section">
            <h3 style="color:#1a5e20; text-align:center;">تسجيل الحج</h3>
            <input type="text" placeholder="الاسم الرباعي">
            <input type="number" placeholder="العمر">
            <input type="text" placeholder="الجنسية">
            <a href="https://wa.me/966551655706?text=السلام%20عليكم%20أريد%20التقديم%20على%20خدمة%20الحج" class="whatsapp-btn">تقديم طلب حج عبر الخاص 💬</a>
        </div>
        <div id="umrah-form" class="form-section">
            <h3 style="color:#bf9b30; text-align:center;">طلب عمرة</h3>
            <select id="umrah-type" onchange="toggleMadinaBadge()">
                <option value="none">اختر نوع العمرة</option>
                <option value="full">عمرة بخدمات داخلية</option>
                <option value="only-visa">عمرة بدون خدمات</option>
            </select>
            <div id="madina-badge" class="madina-badge">✨ يشمل زيارة المدينة والدخول للروضة</div>
            <input type="text" placeholder="الاسم الكامل">
            <a href="https://wa.me/966551655706?text=السلام%20عليكم%20أريد%20الاستفسار%20عن%20العمرة" class="whatsapp-btn">استفسار عن العمرة 💬</a>
        </div>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>
    <script>
        function showForm(type) { document.getElementById('hajj-form').style.display = 'none'; document.getElementById('umrah-form').style.display = 'none'; document.getElementById(type + '-form').style.display = 'block'; }
        function toggleMadinaBadge() { var type = document.getElementById('umrah-type').value; document.getElementById('madina-badge').style.display = (type === 'full') ? 'block' : 'none'; }
    </script>
</body>
</html>
